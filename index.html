<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Office</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
}

.header{
    height:60px;
    background:#111;
    border-bottom:1px solid #333;
    display:flex;
    align-items:center;
    padding:0 20px;
    font-size:20px;
    font-weight:bold;
}

.sidebar{
    width:250px;
    height:calc(100vh - 60px);
    background:#0a0a0a;
    border-right:1px solid #222;
    padding:10px;
}

.menu-item{
    margin-bottom:8px;
}

.menu-btn{
    width:100%;
    background:#111;
    color:#fff;
    border:none;
    padding:12px;
    text-align:left;
    cursor:pointer;
    border-radius:4px;
}

.menu-btn:hover{
    background:#1b1b1b;
}

.submenu{
    display:none;
    margin-top:5px;
    margin-left:15px;
}

.submenu a{
    display:block;
    padding:10px;
    text-decoration:none;
    color:#ccc;
}

.submenu a:hover{
    color:#00ff00;
}

.container{
    display:flex;
}

.content{
    flex:1;
    padding:20px;
}

</style>
</head>
<body>

<div class="header">
    E-OFFICE
</div>

<div class="container">

    <div class="sidebar">

        <div class="menu-item">

            <button class="menu-btn" onclick="toggleMenu()">
                ▼ KEPEGAWAIAN
            </button>

            <div class="submenu" id="pegawaiMenu">

                <a href="#">Mutasi</a>

                <a href="#">Kenaikan Pangkat</a>

            </div>

        </div>

    </div>

    <div class="content">

        <h2>Dashboard</h2>
        <p>Silakan pilih menu di sebelah kiri.</p>

    </div>

</div>

<script>

function toggleMenu(){

    const menu = document.getElementById("pegawaiMenu");

    if(menu.style.display==="block"){
        menu.style.display="none";
    }else{
        menu.style.display="block";
    }

}

</script>

</body>
</html>
