<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMMAND CENTER - Administrasi Surat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#050816;
    --panel:#0b1220;
    --border:#163052;
    --cyan:#00e5ff;
    --cyan2:#00bfff;
    --text:#dffcff;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
}

/* Background Grid */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(0,229,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.05) 1px, transparent 1px);
    background-size:40px 40px;
    animation:gridMove 20s linear infinite;
    pointer-events:none;
}

@keyframes gridMove{
    from{transform:translateY(0);}
    to{transform:translateY(40px);}
}

/* Layout */
.container{
    display:flex;
    height:100vh;
}

/* Sidebar */
.sidebar{
    width:85px;
    background:rgba(8,16,32,.95);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px 0;
    z-index:10;
}

.logo{
    width:55px;
    height:55px;
    border:1px solid var(--cyan);
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    box-shadow:0 0 15px rgba(0,229,255,.5);
}

.menu{
    margin-top:30px;
    width:100%;
}

.menu button{
    width:100%;
    height:60px;
    background:none;
    border:none;
    color:var(--cyan);
    font-size:22px;
    cursor:pointer;
    transition:.3s;
}

.menu button:hover{
    background:rgba(0,229,255,.08);
    box-shadow:inset 3px 0 var(--cyan);
}

/* Main */
.main{
    flex:1;
    padding:20px;
    overflow:auto;
}

/* Header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;
    color:var(--cyan);
    text-shadow:0 0 10px var(--cyan);
}

.clock{
    text-align:right;
}

.time{
    font-size:32px;
    font-weight:bold;
    color:var(--cyan);
}

.date{
    color:#8cc9d3;
}

/* Cards */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:20px;
}

.card{
    background:rgba(11,18,32,.8);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    backdrop-filter:blur(10px);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:var(--cyan);
    box-shadow:0 0 25px rgba(0,229,255,.25);
}

.card h4{
    color:#7fb5c5;
    margin-bottom:10px;
}

.card .value{
    font-size:36px;
    font-weight:bold;
    color:var(--cyan);
}

/* Quick Action */
.panel{
    background:rgba(11,18,32,.8);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

.panel-title{
    color:var(--cyan);
    font-weight:bold;
    margin-bottom:15px;
    letter-spacing:1px;
}

.actions{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.action-btn{
    padding:18px;
    border-radius:14px;
    border:1px solid var(--border);
    background:#09111f;
    color:var(--text);
    cursor:pointer;
    transition:.3s;
    font-size:15px;
}

.action-btn:hover{
    border-color:var(--cyan);
    box-shadow:0 0 20px rgba(0,229,255,.3);
}

/* Activity */
.activity{
    display:grid;
    gap:10px;
}

.log{
    padding:12px;
    border-left:3px solid var(--cyan);
    background:#09111f;
    border-radius:8px;
}

.status{
    color:#00ff88;
}

/* Footer */
.footer{
    margin-top:20px;
    text-align:center;
    color:#5f8391;
    font-size:12px;
}
</style>
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo">⚡</div>

        <div class="menu">
            <button title="Dashboard">🏠</button>
            <button title="Personel">👥</button>
            <button title="Surat Cuti">📝</button>
            <button title="Surat Izin">📋</button>
            <button title="Surat Perintah">📄</button>
            <button title="Arsip">📚</button>
            <button onclick="toggleFullscreen()" title="Fullscreen">🖥️</button>
        </div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">

            <div>
                <div class="title">
                    COMMAND CENTER
                </div>
                <div style="color:#88b7c4">
                    Sistem Administrasi Surat
                </div>
            </div>

            <div class="clock">
                <div class="time" id="time"></div>
                <div class="date" id="date"></div>
                <div class="status">● ONLINE</div>
            </div>

        </div>

        <!-- STATS -->
        <div class="cards">

            <div class="card">
                <h4>PERSONEL</h4>
                <div class="value">245</div>
            </div>

            <div class="card">
                <h4>SURAT HARI INI</h4>
                <div class="value">12</div>
            </div>

            <div class="card">
                <h4>SURAT BULAN INI</h4>
                <div class="value">156</div>
            </div>

            <div class="card">
                <h4>ARSIP PDF</h4>
                <div class="value">1.234</div>
            </div>

        </div>

        <!-- QUICK ACTION -->
        <div class="panel">

            <div class="panel-title">
                QUICK ACTION
            </div>

            <div class="actions">

                <button class="action-btn">
                    ➕ BUAT SURAT CUTI
                </button>

                <button class="action-btn">
                    ➕ BUAT SURAT IZIN
                </button>

                <button class="action-btn">
                    ➕ BUAT SURAT PERINTAH
                </button>

                <button class="action-btn">
                    📁 BUKA ARSIP SURAT
                </button>

            </div>

        </div>

        <!-- ACTIVITY -->
        <div class="panel">

            <div class="panel-title">
                AKTIVITAS TERBARU
            </div>

            <div class="activity">

                <div class="log">
                    CT-001 dibuat oleh Operator
                </div>

                <div class="log">
                    IZ-010 dicetak ke PDF
                </div>

                <div class="log">
                    SP-005 disetujui
                </div>

                <div class="log">
                    Data personel diperbarui
                </div>

            </div>

        </div>

        <div class="footer">
            COMMAND CENTER v1.0
        </div>

    </div>

</div>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById('time').innerHTML =
        now.toLocaleTimeString('id-ID');

    document.getElementById('date').innerHTML =
        now.toLocaleDateString('id-ID',{
            weekday:'long',
            year:'numeric',
            month:'long',
            day:'numeric'
        });

}

setInterval(updateClock,1000);
updateClock();

function toggleFullscreen(){

    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }

}

</script>

</body>
</html>
